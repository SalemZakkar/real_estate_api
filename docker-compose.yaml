services:
  app:
    image: salemzakkar/realestate_app:1.0.0
    container_name: realestate_app
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: always   # <- changed from unless-stopped
    volumes:
      - ./src/uploads:/app/uploads

  db:
    image: postgres:18
    container_name: realestate_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: real_estate
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql   # <-- changed
    restart: always

volumes:
  pgdata: